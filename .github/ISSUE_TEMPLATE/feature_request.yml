name: Feature Request
description: Propose a scoped feature or enhancement with clear delivery boundaries
title: "feat: "
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Use this template for concrete feature work or developer-experience improvements that are smaller than an epic and do not need a separate architecture discussion first.

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Feature
        - Enhancement
        - Diagnostics / developer experience
        - Workflow improvement
        - Maintenance-focused improvement
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search quality and retrieval
        - CLI interface and commands
        - MCP server and HTTP transport
        - Collection management and configuration
        - Embedding and indexing
        - Output formatting
        - Remote backend and model integration
        - Testing and CI/CD
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      options:
        - Beginner
        - Intermediate
        - Advanced
    validations:
      required: true

  - type: dropdown
    id: maintainer_guidance_needed
    attributes:
      label: Maintainer Guidance Needed
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What limitation or rough edge does this feature solve?
      placeholder: "There is no single diagnostics command for sqlite-vec, backend mode, auth, and daemon health."
    validations:
      required: true

  - type: textarea
    id: why_it_matters
    attributes:
      label: Why It Matters
      description: Explain the impact on users, contributors, or maintainers.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Define the intended implementation boundaries and expected deliverable.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Provide a concrete done-definition for the implementation.
    validations:
      required: true

  - type: textarea
    id: relevant_files
    attributes:
      label: Relevant Files
      description: List the main code, test, and documentation files involved.
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: Testing
      description: Describe how the feature should be validated.
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: Identify adjacent work that should not be bundled into this issue.
    validations:
      required: true

  - type: textarea
    id: difficulty_rationale
    attributes:
      label: Difficulty Rationale
      description: Explain the expected implementation complexity.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Note any alternatives or workarounds already considered.

  - type: checkboxes
    id: checklist
    attributes:
      label: Reporter Checklist
      options:
        - label: I have searched open and recently closed issues to ensure this is not a duplicate.
          required: true
        - label: I have documented the scope, verification plan, and non-goals.
          required: true
