name: Bug Report
description: Report a bug or runtime regression with triage-ready technical detail
title: "bug: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Use this template for reproducible bugs, regressions, and compatibility failures.

        Include enough detail for a maintainer to understand impact, scope the fix, and route the issue without a follow-up clarification round.

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Bug
        - Regression
        - Compatibility issue
        - Crash / runtime failure
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI interface and commands
        - Configuration and YAML catalogs
        - Indexing and collection management
        - Search and retrieval
        - MCP server and HTTP transport
        - Remote backend and model integration
        - Packaging and install workflows
        - Testing infrastructure
        - CI/CD and automation
        - Other
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      options:
        - Needs triage
        - Beginner
        - Intermediate
        - Advanced
    validations:
      required: true

  - type: dropdown
    id: maintainer_guidance_needed
    attributes:
      label: Maintainer Guidance Needed
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Summarize the bug or regression clearly.
      placeholder: "Running `kindx query` in remote-backend mode falls back silently even when rerank support is expected."
    validations:
      required: true

  - type: textarea
    id: why_it_matters
    attributes:
      label: Why It Matters
      description: Explain user impact, severity, or maintainer urgency.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Describe the affected workflow, commands, or components.
      placeholder: |
        Affected:
        - `kindx search`
        - `kindx query`

        Not affected:
        - `kindx get`
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide detailed steps to reproduce the behavior.
      placeholder: |
        1. Run `kindx collection add ~/notes --name notes`
        2. Run `kindx embed`
        3. Run `kindx search "example query"`
        4. See error...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: What would a successful fix look like?
      placeholder: |
        - [ ] The failure is reproducible in a focused test or scripted scenario
        - [ ] The failing command now behaves as expected
        - [ ] Existing related behavior remains unchanged
    validations:
      required: true

  - type: textarea
    id: relevant_files
    attributes:
      label: Relevant Files
      description: List the code, tests, or docs most likely involved.
      placeholder: |
        - `engine/kindx.ts`
        - `engine/repository.ts`
        - `specs/command-line.test.ts`
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: Testing
      description: Describe how the fix should be verified.
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: Call out related work that should stay out of scope for this bug fix.
    validations:
      required: true

  - type: textarea
    id: difficulty_rationale
    attributes:
      label: Difficulty Rationale
      description: Explain the expected implementation complexity or review risk.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide details about your environment.
      value: |
        - KINDX version: (run `kindx --version`)
        - Node.js version: (run `node --version`)
        - OS: (e.g., macOS 15.2, Ubuntu 24.04, Windows 11)
        - Architecture: (e.g., ARM64, x86_64)
        - Shell: (e.g., zsh, bash, PowerShell)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Paste any relevant log output or terminal output here.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Reporter Checklist
      options:
        - label: I have searched open and recently closed issues to ensure this is not a duplicate.
          required: true
        - label: I have included the KINDX version, Node.js version, and OS in the environment section.
          required: true
        - label: I have listed the affected scope, relevant files, and verification steps.
          required: true
