name: Epic / Tracking Issue
description: Track a multi-phase initiative that requires several coordinated PRs
title: "epic: "
labels: ["epic", "triage"]
assignees: ["ambicuity"]
body:
  - type: markdown
    attributes:
      value: |
        Epics are for roadmap-sized work that spans multiple PRs or sub-issues. Use this template when a single implementation issue would be too large to review or coordinate safely.

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Epic
        - Multi-PR feature program
        - Cross-cutting maintainer initiative
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search and retrieval
        - CLI interface and commands
        - Configuration and YAML catalogs
        - MCP server and HTTP transport
        - Remote backend and model integration
        - Packaging and install workflows
        - Testing infrastructure
        - CI/CD and automation
        - Cross-cutting / multiple subsystems
        - Other
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      options:
        - Epic-scale
    validations:
      required: true

  - type: dropdown
    id: maintainer_guidance_needed
    attributes:
      label: Maintainer Guidance Needed
      options:
        - High
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the large-scale gap or opportunity this epic addresses.
    validations:
      required: true

  - type: textarea
    id: why_it_matters
    attributes:
      label: Why It Matters
      description: Explain the roadmap value, maintainer need, or user impact.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Define the intended boundaries, key workstreams, and explicit exclusions.
    validations:
      required: true

  - type: textarea
    id: technical_design
    attributes:
      label: Technical Design
      description: |
        High-level design covering:
        - Schema changes (new tables, columns)
        - Affected files and components
        - API surface (CLI flags, MCP tools)
        - Data flow changes
      placeholder: |
        ### Schema Changes
        ```sql
        CREATE TABLE ...
        ```

        ### Affected Files
        - `engine/repository.ts` — ...
        - `engine/protocol.ts` — ...

        ### CLI Surface
        ```bash
        kindx <new-command> ...
        ```
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: Concrete, verifiable conditions that must be met for this epic to be considered complete.
      placeholder: |
        - [ ] The child issues cover the full scope
        - [ ] The user-facing surface is documented
        - [ ] The rollout or migration plan is explicit
        - [ ] `npm run build` and `npm test` pass for the completed work
    validations:
      required: true

  - type: textarea
    id: relevant_files
    attributes:
      label: Relevant Files and Systems
      description: List the primary files, workflows, or subsystems involved.
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: Testing and Rollout
      description: Describe validation strategy, rollout plan, and operational checks.
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: Identify adjacent initiatives that should not be included in this epic.
    validations:
      required: true

  - type: textarea
    id: difficulty_rationale
    attributes:
      label: Difficulty Rationale
      description: Explain why this work needs epic-level coordination.
    validations:
      required: true

  - type: textarea
    id: sub_tasks
    attributes:
      label: Sub-Tasks
      description: |
        Break the epic into implementable units. Each should be a separate PR.
        Use `- [ ]` for uncompleted tasks and link to child issues as they are created.
      placeholder: |
        - [ ] Phase 1: Schema migration (#___)
        - [ ] Phase 2: Core implementation (#___)
        - [ ] Phase 3: CLI/MCP integration (#___)
        - [ ] Phase 4: Tests and documentation (#___)
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Epic Checklist
      options:
        - label: I have searched open and recently closed issues, epics, and proposals to ensure this is not a duplicate.
          required: true
        - label: This epic has been discussed in an architecture proposal or is maintainer-initiated.
          required: true
        - label: I documented child workstreams, acceptance criteria, and explicit non-goals.
          required: true
