name: Performance Improvement
description: Propose a measured performance improvement with concrete verification targets
title: "perf: "
labels: ["performance", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Use this template for latency, throughput, memory, cold-start, or operational efficiency improvements.

        Performance issues should be grounded in measurements or a clear, reproducible verification plan.

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Latency improvement
        - Throughput improvement
        - Memory reduction
        - Cold-start improvement
        - CI / packaging efficiency
        - Operational diagnostics
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Model loading / cold start
        - Embedding and indexing
        - BM25 / FTS5 search
        - Vector search
        - Query expansion
        - Reranking
        - MCP server overhead
        - Database I/O
        - Packaging and install workflows
        - CI/CD and automation
        - Multiple areas
        - Other
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      options:
        - Beginner
        - Intermediate
        - Advanced
    validations:
      required: true

  - type: dropdown
    id: maintainer_guidance_needed
    attributes:
      label: Maintainer Guidance Needed
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the bottleneck or optimization opportunity.
      placeholder: "The repository has a smoke-install script, but no CI job exercises install/runtime packaging behavior."
    validations:
      required: true

  - type: textarea
    id: why_it_matters
    attributes:
      label: Why It Matters
      description: Explain the user, contributor, or maintainer impact.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Define the intended implementation boundaries.
    validations:
      required: true

  - type: textarea
    id: current_metrics
    attributes:
      label: Current Metrics
      description: Provide measured numbers — latency, throughput, memory usage, corpus size. Include how you measured them (e.g., `kindx status`, `time kindx search ...`, profiling tools).
      placeholder: |
        - Corpus: 12,000 documents, 48,000 chunks
        - `time kindx query "auth flow"` → 4.2s wall clock
        - Model load: ~3.1s, query expansion: ~0.8s, vector scan: ~0.3s
    validations:
      required: true

  - type: textarea
    id: target_metrics
    attributes:
      label: Target Metrics
      description: What performance target should this change achieve?
      placeholder: |
        - `kindx query` on warm daemon: < 1.5s end-to-end
        - Cold start (no daemon): < 2.5s end-to-end
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: List the concrete conditions for completion.
    validations:
      required: true

  - type: textarea
    id: relevant_files
    attributes:
      label: Relevant Files
      description: List the main code, workflow, script, and doc files involved.
    validations:
      required: true

  - type: textarea
    id: testing
    attributes:
      label: Testing
      description: Describe the validation steps and measurement method.
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: Identify nearby work that should stay out of scope.
    validations:
      required: true

  - type: textarea
    id: difficulty_rationale
    attributes:
      label: Difficulty Rationale
      description: Explain the expected implementation complexity.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Hardware and software details relevant to the performance issue.
      value: |
        - KINDX version: (run `kindx --version`)
        - Node.js version: (run `node --version`)
        - OS / Architecture: (e.g., macOS 15.2 ARM64, Ubuntu 24.04 x86_64)
        - GPU: (e.g., Apple M3 Pro, NVIDIA RTX 4090, CPU-only)
        - RAM: (e.g., 16 GB)
        - Corpus size: (documents and approximate chunk count)
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Reporter Checklist
      options:
        - label: I have included measured metrics, not just subjective impressions.
          required: true
        - label: I have searched open and recently closed issues to ensure this is not a duplicate.
          required: true
        - label: I have documented the files, testing approach, and explicit non-goals.
          required: true
